# Studente EoMT-Tiny su LoveDA CON distillazione dal teacher EoMT-S.
#
# Teacher: EoMT-S (ViT-Small DINOv2) fine-tuned su LoveDA da Russo
# (mIoU 56.1 su val — checkpoint "pulito", solo i 197 tensori del modello).
# Scheda del teacher confermata: num_classes=7, num_q=200, num_blocks=3,
# masked_attn_enabled=False, chiavi con prefisso "network.".
# Al load il log deve dire "loaded 197 tensors, skipped 0".
#
# KD: per-pixel KL con temperatura sulle mappe semantiche collassate,
# applicata a ogni uscita deep-supervised dello studente.
trainer:
  max_epochs: 20
  check_val_every_n_epoch: 4
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "loveda_semantic_eomt_tiny_640_distill"
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args:
        max_depth: 3
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: metrics/val_iou_all
        mode: max
        save_top_k: 1
        save_last: true
        filename: "best-{epoch:02d}"
        auto_insert_metric_name: false
model:
  class_path: training.mask_classification_semantic_distill.MaskClassificationSemanticDistill
  init_args:
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [2100, 5250, 8400]
    attn_mask_annealing_end_steps: [4200, 7350, 10500]
    kd_coefficient: 1.0
    kd_temperature: 2.0
    teacher_ckpt_path: checkpoints/loveda_ft_eomt_small_640_best.bin
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 100
        num_blocks: 3
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: vit_tiny_patch16_224.augreg_in21k_ft_in1k
            patch_size: 16
    teacher_network:
      class_path: models.eomt.EoMT
      init_args:
        num_classes: 7
        num_q: 200
        num_blocks: 3
        masked_attn_enabled: False
        encoder:
          class_path: models.vit.ViT
          init_args:
            img_size: [640, 640]
            patch_size: 16
            backbone_name: vit_small_patch14_reg4_dinov2
            ckpt_path: skip_pretrained_download
data:
  class_path: datasets.loveda_semantic.LoveDASemantic
  init_args:
    path: data/loveda
    batch_size: 4
    num_workers: 4
